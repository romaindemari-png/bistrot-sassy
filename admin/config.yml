backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ─────────────────────────────────────────
  # INFOS GÉNÉRALES
  # ─────────────────────────────────────────
  - name: "infos"
    label: "Infos du bistrot"
    files:
      - name: "general"
        label: "Présentation & Contact"
        file: "_data/general.json"
        fields:
          - { label: "Nom du bistrot", name: "nom", widget: "string" }
          - { label: "Accroche (slogan)", name: "accroche", widget: "string" }
          - { label: "Téléphone", name: "telephone", widget: "string" }
          - { label: "Adresse", name: "adresse", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Lien Google Maps", name: "maps_url", widget: "string" }
          - { label: "WhatsApp (numéro sans +)", name: "whatsapp", widget: "string" }

      - name: "horaires"
        label: "Horaires d'ouverture"
        file: "_data/horaires.json"
        fields:
          - label: "Horaires par jour"
            name: "jours"
            widget: "list"
            fields:
              - { label: "Jour", name: "jour", widget: "string" }
              - { label: "Heures", name: "heures", widget: "string" }
              - { label: "Ouvert", name: "ouvert", widget: "boolean", default: true }
          - { label: "Note (ex: cuisine jusqu'à...)", name: "note", widget: "string", required: false }

  # ─────────────────────────────────────────
  # CARTE DU RESTAURANT
  # Un seul fichier carte.json avec toutes les catégories
  # ─────────────────────────────────────────
  - name: "carte"
    label: "Carte du restaurant"
    files:
      - name: "carte"
        label: "Tous les plats"
        file: "_data/carte.json"
        fields:
          - label: "Entrées"
            name: "entrees"
            widget: "list"
            fields:
              - { label: "Nom du plat", name: "nom", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Prix", name: "prix", widget: "string" }

          - label: "Viandes"
            name: "viandes"
            widget: "list"
            fields:
              - { label: "Nom du plat", name: "nom", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Prix", name: "prix", widget: "string" }

          - label: "Vins"
            name: "vins"
            widget: "list"
            fields:
              - { label: "Nom", name: "nom", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Prix", name: "prix", widget: "string" }

          - label: "Poissons"
            name: "poissons"
            widget: "list"
            fields:
              - { label: "Nom du plat", name: "nom", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Prix", name: "prix", widget: "string" }

          - label: "Desserts"
            name: "desserts"
            widget: "list"
            fields:
              - { label: "Nom du plat", name: "nom", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Prix", name: "prix", widget: "string" }

  # ─────────────────────────────────────────
  # PHOTOS
  # ─────────────────────────────────────────
  - name: "photos"
    label: "Photos"
    files:
      - name: "photos"
        label: "Slider & Galerie"
        file: "_data/photos.json"
        fields:
          - label: "Photos du slider (hero)"
            name: "slider"
            widget: "list"
            max: 3
            fields:
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Texte alternatif", name: "alt", widget: "string", required: false }

          - label: "Galerie"
            name: "galerie"
            widget: "list"
            max: 6
            fields:
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Légende", name: "legende", widget: "string", required: false }
